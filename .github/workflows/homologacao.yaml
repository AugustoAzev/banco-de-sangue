name: Tests

on:
  push:
    branches: [master, develop, 'feature/**']
  pull_request:
    branches: [master, develop]

jobs:
  test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: banco_sangue_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -q pytest httpx
          pip install -q alembic "python-jose[cryptography]" "passlib[bcrypt]" bcrypt python-multipart sqlalchemy fastapi uvicorn python-dotenv pymysql psycopg2-binary

      - name: Create database
        run: |
          PGPASSWORD=test psql -h localhost -U test -c "CREATE DATABASE banco_sangue_test;" || true

      - name: Run pytest with SQLite (no DB needed)
        working-directory: backend
        run: pytest tests/ -v --tb=short

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend deps + Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test || echo "Playwright tests require running backend"
